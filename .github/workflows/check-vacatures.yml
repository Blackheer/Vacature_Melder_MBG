name: Check Cogas Vacancies

on:
  schedule:
    - cron: '0 8 * * *' # Draait elke dag om 08:00 UTC
  workflow_dispatch: # Maakt handmatig starten mogelijk

jobs:
  check-jobs:
    runs-on: ubuntu-latest
    permissions:
      contents: write # Nodig om wijzigingen in JSON op te slaan in de repo
      
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install requests beautifulsoup4

      - name: Run script
        env:
          MAIL_USERNAME: ${{ secrets.MAIL_USERNAME }}
          MAIL_PASSWORD: ${{ secrets.MAIL_PASSWORD }}
          MAIL_TO: ${{ secrets.MAIL_TO }}
        run: python checker.py

      - name: Commit and push if vacancies changed
        run: |
          git config --global user.name "GitHub Action"
          git config --global user.email "action@github.com"
          git add vacancies.json
          git diff --staged --quiet || git commit -m "Update vacatures lijst"
          git push
